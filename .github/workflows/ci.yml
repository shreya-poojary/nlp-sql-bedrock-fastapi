name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 . --count --max-line-length=120 \
            --max-complexity=10 \
            --ignore=E501,W503,E302,E303,W291,W293,E231,E225,E251 \
            --exclude=.git,__pycache__,.env \
            --statistics || true

      - name: Run tests
        run: |
          pytest simple_test.py -v || true
